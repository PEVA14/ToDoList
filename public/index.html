<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task List App</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #f8f9fa;
    }

    .task-completed .task-title {
      text-decoration: line-through;
      color: #adb5bd;
    }

    .task-card {
      transition: opacity 0.2s;
    }

    .task-completed {
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold">📋 Task List App</span>
    </div>
  </nav>

  <div class="container" style="max-width: 680px;">
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <h5 class="card-title mb-3">Nueva tarea</h5>
        <form id="taskForm">
          <div class="mb-3">
            <input
              type="text"
              id="taskTitle"
              class="form-control"
              placeholder="Escribe una tarea..."
              maxlength="255"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100">
            Agregar tarea
          </button>
        </form>
        <div id="formError" class="alert alert-danger mt-2 d-none"></div>
      </div>
    </div>

    <h5 class="mb-3">Tareas <span id="taskCount" class="badge bg-secondary">0</span></h5>

    <div id="taskList"></div>

    <div id="emptyMessage" class="text-center text-muted mt-4 d-none">
      <p>No tienes tareas todavía. ¡Agrega una!</p>
    </div>

  </div>

  <!-- Bootstrap JS (para tooltips si se usan, no es estrictamente necesario) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Nuestro JavaScript -->
  <script src="app.js"></script>
</body>
</html>
